<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reflection Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d12;
      --bg2: #13131c;
      --bg3: #1a1a28;
      --surface: #1e1e2e;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --sage: #7ecfa0;
      --sage-dim: rgba(126,207,160,0.12);
      --blue: #6faee8;
      --blue-dim: rgba(111,174,232,0.12);
      --violet: #b48eff;
      --violet-dim: rgba(180,142,255,0.12);
      --text: #e8e4dc;
      --text-dim: #8a8578;
      --text-muted: #52504a;
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(111,174,232,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(180,142,255,0.02) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    #header {
      padding: 28px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.2s forwards;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .axis-indicator {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .axis-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.4s ease;
    }

    .axis-dot.active { background: var(--gold); transform: scale(1.4); }
    .axis-dot.done { background: var(--sage); }

    .axis-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: 4px;
      transition: color 0.4s ease;
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 32px 0;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

    /* Messages */
    .message {
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(10px);
      animation: slideIn 0.5s ease forwards;
    }

    .message-inner {
      display: inline-block;
      max-width: 90%;
      padding: 16px 20px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 15px;
    }

    /* System message (tree speaks) */
    .msg-system .message-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* Reflection message */
    .msg-reflection .message-inner {
      background: var(--sage-dim);
      border: 1px solid rgba(126,207,160,0.2);
      color: var(--text);
      border-left: 3px solid var(--sage);
      font-style: italic;
    }

    /* Bridge message */
    .msg-bridge .message-inner {
      background: var(--violet-dim);
      border: 1px solid rgba(180,142,255,0.15);
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    /* Summary message */
    .msg-summary .message-inner {
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--text);
      border-left: 3px solid var(--gold);
      white-space: pre-line;
    }

    /* User message */
    .msg-user {
      text-align: right;
    }

    .msg-user .message-inner {
      background: var(--blue-dim);
      border: 1px solid rgba(111,174,232,0.2);
      color: var(--text);
      font-size: 14px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: fit-content;
      margin-bottom: 20px;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    /* Input area */
    #input-area {
      padding: 20px 32px 28px;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .option-btn {
      padding: 13px 18px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .option-btn:hover {
      background: var(--blue-dim);
      border-color: rgba(111,174,232,0.3);
      color: var(--blue);
      transform: translateX(3px);
    }

    .option-btn:active {
      transform: translateX(1px) scale(0.99);
    }

    .option-btn.selected {
      background: var(--blue-dim);
      border-color: var(--blue);
      color: var(--blue);
    }

    .continue-btn {
      padding: 13px 32px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 10px;
      color: var(--gold);
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .continue-btn:hover {
      background: var(--gold-dim);
    }

    /* Progress bar */
    #progress-bar {
      height: 2px;
      background: var(--border);
      margin: 0 32px;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--sage));
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* End screen */
    #end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 32px;
      flex: 1;
    }

    .end-icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s ease infinite;
    }

    .end-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .end-subtitle {
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .restart-btn {
      padding: 12px 28px;
      background: transparent;
      border: 1px solid var(--text-muted);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn:hover {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    /* Markdown-like bold inside summaries */
    .bold { font-weight: 500; color: var(--gold); }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">✦ Daily Reflection</div>
    <div class="axis-indicator">
      <div class="axis-dot" id="dot-axis1" title="Axis 1: Locus"></div>
      <div class="axis-dot" id="dot-axis2" title="Axis 2: Orientation"></div>
      <div class="axis-dot" id="dot-axis3" title="Axis 3: Radius"></div>
      <div class="axis-label" id="axis-label">Starting</div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="chat"></div>

  <div id="input-area"></div>
</div>

<script>
// ─── TREE DATA ───────────────────────────────────────────────────────────────
const TREE = {
  "START": {
    id:"START", type:"start",
    text:"Good evening. Glad you're here.\n\nThis is your space — no performance, no right answers. We're just going to look honestly at your day together.\n\nIt takes about 5 minutes. Let's begin.",
    next:"A1_OPEN"
  },
  "A1_OPEN": {
    id:"A1_OPEN", type:"question", axis:1,
    text:"Let's start simply. If today were a weather report, what would it be?",
    options:[
      {label:"🌤 Sunny — things clicked, I felt on.", value:"sunny"},
      {label:"☁️ Overcast — steady, but low energy.", value:"overcast"},
      {label:"⛈ Stormy — rough patches, maybe conflict.", value:"stormy"},
      {label:"🌫 Foggy — unclear, hard to get traction.", value:"foggy"}
    ],
    next:"A1_D1"
  },
  "A1_D1": {
    id:"A1_D1", type:"decision",
    routes:[
      {condition:(s)=>["sunny","overcast"].includes(s.answers["A1_OPEN"]), target:"A1_Q_AGENCY_HIGH"},
      {condition:(s)=>["stormy","foggy"].includes(s.answers["A1_OPEN"]), target:"A1_Q_AGENCY_LOW"}
    ]
  },
  "A1_Q_AGENCY_HIGH": {
    id:"A1_Q_AGENCY_HIGH", type:"question", axis:1,
    text:"You said \"{A1_OPEN}\" — sounds like a relatively workable day. When something went well, what made it happen?",
    options:[
      {label:"I prepared well and showed up intentionally.", value:"prepared"},
      {label:"The team came through — it was collective.", value:"team"},
      {label:"Honestly, things just fell into place.", value:"luck"},
      {label:"I adapted when the original plan changed.", value:"adapted"}
    ],
    next:"A1_D2"
  },
  "A1_Q_AGENCY_LOW": {
    id:"A1_Q_AGENCY_LOW", type:"question", axis:1,
    text:"You said \"{A1_OPEN}\" — sounds like it wasn't easy. When things got hard, what was your first instinct?",
    options:[
      {label:"Figure out what I could still control.", value:"control"},
      {label:"Wait for someone to step in and fix it.", value:"wait"},
      {label:"Feel stuck — not sure what to do.", value:"stuck"},
      {label:"Push through it on my own, head down.", value:"push"}
    ],
    next:"A1_D2"
  },
  "A1_D2": {
    id:"A1_D2", type:"decision",
    routes:[
      {condition:(s)=>{
        const a = s.answers["A1_Q_AGENCY_HIGH"] || s.answers["A1_Q_AGENCY_LOW"];
        return ["prepared","adapted","control","push"].includes(a);
      }, target:"A1_Q2_INTERNAL"},
      {condition:(s)=>true, target:"A1_Q2_EXTERNAL"}
    ]
  },
  "A1_Q2_INTERNAL": {
    id:"A1_Q2_INTERNAL", type:"question", axis:1, signal:"axis1:internal",
    text:"There's something that didn't go the way you hoped today. When you picture that moment — where do you place the cause?",
    options:[
      {label:"Mostly on me — I could have done something differently.", value:"self"},
      {label:"Split — both my choices and outside factors.", value:"split"},
      {label:"Mostly circumstances — I didn't have much say.", value:"external"}
    ],
    next:"A1_D3"
  },
  "A1_Q2_EXTERNAL": {
    id:"A1_Q2_EXTERNAL", type:"question", axis:1, signal:"axis1:external",
    text:"Even on a tough, foggy, or stormy day — somewhere in it, you made a decision. Which of these feels closest?",
    options:[
      {label:"I chose to stay calm when things got tense.", value:"calm"},
      {label:"I asked for help instead of spinning alone.", value:"help"},
      {label:"I kept going even when I wanted to stop.", value:"kept"},
      {label:"I'm honestly not sure I made any meaningful choice.", value:"none"}
    ],
    next:"A1_D3"
  },
  "A1_D3": {
    id:"A1_D3", type:"decision",
    routes:[
      {condition:(s)=>(s.signals["axis1:internal"]||0)>0, target:"A1_R_INTERNAL"},
      {condition:(s)=>true, target:"A1_R_EXTERNAL"}
    ]
  },
  "A1_R_INTERNAL": {
    id:"A1_R_INTERNAL", type:"reflection", axis:1,
    text:"You see your hand in what happened today — not perfectly, maybe not completely, but you're not pointing only outward.\n\nThat's agency. It doesn't mean you controlled everything. It means you stayed in the driver's seat even when the road was rough.\n\nHold that.",
    next:"BRIDGE_1_2"
  },
  "A1_R_EXTERNAL": {
    id:"A1_R_EXTERNAL", type:"reflection", axis:1,
    text:"Hard days pull attention outward — toward what others did, what didn't work, what you couldn't change. That's a very human response.\n\nBut even in those moments, there's usually one small decision that was yours. Asking for help. Taking a breath. Staying in the room.\n\nThat's where your agency lives. Even when it's quiet.",
    next:"BRIDGE_1_2"
  },
  "BRIDGE_1_2": {
    id:"BRIDGE_1_2", type:"bridge",
    text:"Now let's shift from how you handled things — to what you gave.",
    next:"A2_OPEN"
  },
  "A2_OPEN": {
    id:"A2_OPEN", type:"question", axis:2,
    text:"Think about one meaningful interaction you had today — with a colleague, a client, your manager, anyone. What was the energy of it?",
    options:[
      {label:"I gave something — time, effort, perspective.", value:"gave"},
      {label:"I received something — help, feedback, credit.", value:"received"},
      {label:"It felt transactional — equal exchange.", value:"transactional"},
      {label:"I didn't have a meaningful interaction today.", value:"none"}
    ],
    next:"A2_D1"
  },
  "A2_D1": {
    id:"A2_D1", type:"decision",
    routes:[
      {condition:(s)=>s.answers["A2_OPEN"]==="gave", target:"A2_Q_CONTRIBUTION"},
      {condition:(s)=>true, target:"A2_Q_ENTITLEMENT"}
    ]
  },
  "A2_Q_CONTRIBUTION": {
    id:"A2_Q_CONTRIBUTION", type:"question", axis:2, signal:"axis2:contribution",
    text:"You said you gave something today. What was the nature of that giving?",
    options:[
      {label:"I helped someone with something outside my job description.", value:"beyond"},
      {label:"I shared knowledge or taught something.", value:"taught"},
      {label:"I did unglamorous work that no one else wanted.", value:"unglamorous"},
      {label:"I was present and listened when someone needed it.", value:"listened"}
    ],
    next:"A2_Q2"
  },
  "A2_Q_ENTITLEMENT": {
    id:"A2_Q_ENTITLEMENT", type:"question", axis:2, signal:"axis2:entitlement",
    text:"Sometimes we track what we're getting — recognition, fairness, credit. Which of these sounds most familiar today?",
    options:[
      {label:"I felt my effort wasn't noticed or appreciated.", value:"unnoticed"},
      {label:"I felt others weren't pulling their weight.", value:"others_slack"},
      {label:"I stayed focused on my own deliverables.", value:"focused_self"},
      {label:"I was just surviving the day, not really tracking either.", value:"surviving"}
    ],
    next:"A2_Q2"
  },
  "A2_Q2": {
    id:"A2_Q2", type:"question", axis:2,
    text:"One more lens. Was there a moment today where you went beyond what was asked — where no one would have noticed if you hadn't?",
    options:[
      {label:"Yes — I did something extra, unprompted.", value:"yes_extra"},
      {label:"I thought about it but didn't follow through.", value:"thought_not_done"},
      {label:"Not today — I gave what was expected.", value:"expected_only"},
      {label:"No — and today that was actually the right call.", value:"intentional_no"}
    ],
    next:"A2_D2"
  },
  "A2_D2": {
    id:"A2_D2", type:"decision",
    routes:[
      {condition:(s)=>s.signals["axis2:contribution"]>0, target:"A2_R_CONTRIBUTION"},
      {condition:(s)=>true, target:"A2_R_ENTITLEMENT"}
    ]
  },
  "A2_R_CONTRIBUTION": {
    id:"A2_R_CONTRIBUTION", type:"reflection", axis:2, signal:"axis2:contribution",
    text:"You gave today. That's not nothing — it's the quiet engine of functional teams.\n\nThe best organizations run on discretionary effort: the help no one asked for, the knowledge shared without keeping score, the work done even when it's invisible.\n\nYou added something to the system today. Notice that.",
    next:"BRIDGE_2_3"
  },
  "A2_R_ENTITLEMENT": {
    id:"A2_R_ENTITLEMENT", type:"reflection", axis:2, signal:"axis2:entitlement",
    text:"Today you were tracking what you were getting — recognition, fairness, effort from others. That's natural. It's also a signal worth sitting with.\n\nEntitlement isn't a character flaw. It's usually a gap between expectation and reality. The question is: whose job is it to close that gap?\n\nSometimes the answer is 'the organization.' Sometimes it's you — by shifting from what you're owed to what you can give.",
    next:"BRIDGE_2_3"
  },
  "BRIDGE_2_3": {
    id:"BRIDGE_2_3", type:"bridge",
    text:"Now let's zoom out from what you gave — to who you were thinking about.",
    next:"A3_OPEN"
  },
  "A3_OPEN": {
    id:"A3_OPEN", type:"question", axis:3,
    text:"When you replay today's biggest challenge right now — who's in the frame?",
    options:[
      {label:"Just me — it was my problem to solve.", value:"just_me"},
      {label:"Me and one specific person.", value:"me_and_one"},
      {label:"My team — we were all in it together.", value:"team"},
      {label:"The customer or end user we ultimately serve.", value:"customer"}
    ],
    next:"A3_D1"
  },
  "A3_D1": {
    id:"A3_D1", type:"decision",
    routes:[
      {condition:(s)=>["just_me","me_and_one"].includes(s.answers["A3_OPEN"]), target:"A3_Q_SELF"},
      {condition:(s)=>true, target:"A3_Q_OTHER"}
    ]
  },
  "A3_Q_SELF": {
    id:"A3_Q_SELF", type:"question", axis:3, signal:"axis3:self",
    text:"It's okay to be focused inward — especially on hard days. But let's stretch the frame a little. Was there anyone today who was affected by your work, even indirectly?",
    options:[
      {label:"Yes — I can think of someone specific.", value:"yes_specific"},
      {label:"Probably, but I didn't really think about them.", value:"probably"},
      {label:"My work today felt pretty isolated from others.", value:"isolated"}
    ],
    next:"A3_D2"
  },
  "A3_Q_OTHER": {
    id:"A3_Q_OTHER", type:"question", axis:3, signal:"axis3:other",
    text:"You're already holding others in the frame — that's meaningful. Did you act on that awareness at any point today?",
    options:[
      {label:"Yes — I checked in or adjusted based on their needs.", value:"acted"},
      {label:"I was aware of it, but didn't act differently.", value:"aware_not_acted"},
      {label:"It was more about the bigger mission than one person.", value:"mission"}
    ],
    next:"A3_D2"
  },
  "A3_D2": {
    id:"A3_D2", type:"decision",
    routes:[
      {condition:(s)=>s.signals["axis3:self"]>0, target:"A3_R_SELF"},
      {condition:(s)=>true, target:"A3_R_OTHER"}
    ]
  },
  "A3_R_SELF": {
    id:"A3_R_SELF", type:"reflection", axis:3, signal:"axis3:self",
    text:"Today your attention stayed close — on your own work, your own stress, your own outcomes. That's not wrong. Focused days are real.\n\nBut here's something worth knowing: Maslow's most underappreciated insight was that the healthiest humans eventually orient outward — not because they've fixed themselves, but because they've expanded what 'self' even means.\n\nTomorrow: one moment. One glance at how your work lands in someone else's world.",
    next:"SUMMARY"
  },
  "A3_R_OTHER": {
    id:"A3_R_OTHER", type:"reflection", axis:3, signal:"axis3:other",
    text:"Your frame includes others — their needs, their experience, the bigger mission. That's perspective-taking in practice.\n\nThis isn't altruism for its own sake. Research consistently shows that people who orient beyond themselves at work report more meaning, more resilience, and more satisfaction — not because life gets easier, but because it gets larger.\n\nYou're already doing it.",
    next:"SUMMARY"
  },
  "SUMMARY": {
    id:"SUMMARY", type:"summary",
    next:"END"
  },
  "END": {
    id:"END", type:"end",
    text:"Rest well. See you tomorrow."
  }
};

// ─── AXIS LABELS ─────────────────────────────────────────────────────────────
const AXIS_LABELS = { 1:"Locus", 2:"Orientation", 3:"Radius" };

const AXIS_SUMMARIES = {
  "axis1:internal": "You located your choices even when things were hard.",
  "axis1:external": "Tomorrow: find the one small decision that was yours.",
  "axis2:contribution": "You added to the system without being asked.",
  "axis2:entitlement": "Tomorrow: one act of giving before counting what you're owed.",
  "axis3:other": "You held others in the frame — that widens everything.",
  "axis3:self": "Tomorrow: one moment of imagining how your work lands for someone else."
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  currentNode: "START",
  answers: {},
  signals: {},
  history: [],
  awaitingContinue: false,
  done: false
};

// Progress tracking (estimated node count)
const TOTAL_NODES = 29;
let visitedCount = 0;

// ─── DOM ──────────────────────────────────────────────────────────────────────
const chat = document.getElementById("chat");
const inputArea = document.getElementById("input-area");
const progressFill = document.getElementById("progress-fill");

function updateProgress() {
  visitedCount++;
  const pct = Math.min(100, Math.round((visitedCount / 16) * 100)); // 16 interactive nodes
  progressFill.style.width = pct + "%";
}

function updateAxisIndicator(axis) {
  ["axis1","axis2","axis3"].forEach((a,i) => {
    const dot = document.getElementById("dot-"+a);
    const currentAxis = parseInt(a.replace("axis",""));
    if (currentAxis < axis) { dot.className = "axis-dot done"; }
    else if (currentAxis === axis) { dot.className = "axis-dot active"; }
    else { dot.className = "axis-dot"; }
  });
  const label = document.getElementById("axis-label");
  label.textContent = axis ? AXIS_LABELS[axis] : "Summary";
}

// ─── CHAT UTILITIES ───────────────────────────────────────────────────────────
function addMessage(text, cls, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = `message ${cls}`;
      const inner = document.createElement("div");
      inner.className = "message-inner";
      // Convert **text** to bold spans
      inner.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<span class="bold">$1</span>').replace(/\n/g, '<br>');
      div.appendChild(inner);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping(duration=900) {
  return new Promise(resolve => {
    const div = document.createElement("div");
    div.className = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    div.id = "typing-indicator";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    setTimeout(() => {
      const t = document.getElementById("typing-indicator");
      if (t) t.remove();
      resolve();
    }, duration);
  });
}

function clearInput() {
  inputArea.innerHTML = "";
}

// ─── INTERPOLATION ────────────────────────────────────────────────────────────
function interpolate(text) {
  return text.replace(/\{([^}]+)\}/g, (_, key) => {
    const val = state.answers[key];
    if (!val) return "_";
    // Return the label for the value
    const node = TREE[key];
    if (node && node.options) {
      const opt = node.options.find(o => o.value === val);
      // Return just the value word (without emoji)
      return opt ? opt.label.replace(/^[^\w]*/, '').split('—')[0].trim().toLowerCase() : val;
    }
    return val;
  });
}

// ─── SIGNAL HANDLING ─────────────────────────────────────────────────────────
function applySignal(signal) {
  if (!signal) return;
  state.signals[signal] = (state.signals[signal] || 0) + 1;
}

// ─── DECISION ROUTING ─────────────────────────────────────────────────────────
function resolveDecision(node) {
  for (const route of node.routes) {
    if (route.condition(state)) return route.target;
  }
  return null;
}

// ─── SUMMARY BUILDER ─────────────────────────────────────────────────────────
function buildSummaryText() {
  const opening = state.answers["A1_OPEN"] || "today";
  const openingNode = TREE["A1_OPEN"];
  const openingOpt = openingNode.options.find(o=>o.value===opening);
  const openingLabel = openingOpt ? openingOpt.label.split('—')[0].trim() : opening;

  const a1 = state.signals["axis1:internal"] > 0 ? "internal" : "external";
  const a2 = state.signals["axis2:contribution"] > 0 ? "contribution" : "entitlement";
  const a3 = state.signals["axis3:other"] > 0 ? "wider" : "close";

  const a1key = a1==="internal" ? "axis1:internal" : "axis1:external";
  const a2key = a2==="contribution" ? "axis2:contribution" : "axis2:entitlement";
  const a3key = a3==="wider" ? "axis3:other" : "axis3:self";

  return `**Here's what your day looked like through the tree:**

**Agency (Axis 1):** Today you leaned toward ${a1 === "internal" ? "internal locus" : "external attribution"}. ${AXIS_SUMMARIES[a1key]}

**Contribution (Axis 2):** On orientation, you were more ${a2}-oriented. ${AXIS_SUMMARIES[a2key]}

**Radius (Axis 3):** Your frame of concern today was ${a3 === "wider" ? "wider — others were in it" : "close to yourself"}. ${AXIS_SUMMARIES[a3key]}

---
You described today as "${openingLabel.toLowerCase()}". Whatever that meant — you showed up, you reflected, and you looked at it honestly.

That's not a small thing.`;
}

// ─── RENDER OPTIONS ───────────────────────────────────────────────────────────
function renderOptions(node) {
  clearInput();
  const grid = document.createElement("div");
  grid.className = "options-grid";
  node.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.label;
    btn.onclick = () => {
      state.answers[node.id] = opt.value;
      // Visual feedback
      grid.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
      btn.classList.add("selected");
      // Show user message
      addMessage(opt.label.replace(/^[^\w]*/, ''), "msg-user");
      setTimeout(() => advance(node.next || getDecisionNext(node)), 400);
    };
    grid.appendChild(btn);
  });
  inputArea.appendChild(grid);
}

function getDecisionNext(questionNode) {
  // Find which decision node follows this question
  // For questions with explicit next, use it. Otherwise navigate tree.
  return questionNode.next;
}

function renderContinue(next) {
  clearInput();
  const btn = document.createElement("button");
  btn.className = "continue-btn";
  btn.textContent = "Continue →";
  btn.onclick = () => {
    clearInput();
    advance(next);
  };
  inputArea.appendChild(btn);
}

// ─── MAIN ADVANCE FUNCTION ────────────────────────────────────────────────────
async function advance(nodeId) {
  if (!nodeId) return;
  const node = TREE[nodeId];
  if (!node) return;

  state.currentNode = nodeId;
  state.history.push(nodeId);
  updateProgress();

  if (node.axis) updateAxisIndicator(node.axis);
  applySignal(node.signal);

  if (node.type === "start") {
    await showTyping(1200);
    await addMessage(node.text, "msg-system");
    setTimeout(() => advance(node.next), 600);
    return;
  }

  if (node.type === "question") {
    await showTyping(800);
    const text = interpolate(node.text);
    await addMessage(text, "msg-system");
    setTimeout(() => renderOptions(node), 200);
    return;
  }

  if (node.type === "decision") {
    const target = resolveDecision(node);
    advance(target);
    return;
  }

  if (node.type === "reflection") {
    await showTyping(1100);
    await addMessage(node.text, "msg-reflection");
    renderContinue(node.next);
    return;
  }

  if (node.type === "bridge") {
    await showTyping(600);
    await addMessage(node.text, "msg-bridge");
    setTimeout(() => advance(node.next), 700);
    return;
  }

  if (node.type === "summary") {
    updateAxisIndicator(0);
    await showTyping(1400);
    const summaryText = buildSummaryText();
    await addMessage(summaryText, "msg-summary");
    renderContinue(node.next);
    return;
  }

  if (node.type === "end") {
    await showTyping(700);
    await addMessage(node.text, "msg-system");
    clearInput();
    // Show restart
    setTimeout(() => {
      const btn = document.createElement("button");
      btn.className = "restart-btn";
      btn.textContent = "Start a new reflection";
      btn.onclick = () => location.reload();
      inputArea.appendChild(btn);
    }, 800);
    return;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
setTimeout(() => advance("START"), 800);
</script>
